<div *ngIf="open" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/50 px-4 backdrop-blur-sm">
  <div class="w-full max-w-3xl rounded-2xl border border-border bg-panel p-5 shadow-card">
    <div class="mb-4 flex items-center justify-between">
      <h3 class="text-lg font-semibold text-ink">{{ title }}</h3>
      <button class="rounded-xl border border-border px-3 py-1.5 text-xs text-ink" (click)="close.emit()">{{ 'common.close' | translate }}</button>
    </div>
    <ng-content></ng-content>
  </div>
</div>

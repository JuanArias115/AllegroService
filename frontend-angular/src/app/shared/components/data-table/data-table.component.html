<div class="overflow-hidden rounded-2xl border border-border bg-panel shadow-card">
  <div *ngIf="loading" class="p-6 text-sm text-muted">{{ 'common.loading' | translate }}</div>

  <table *ngIf="!loading" class="min-w-full divide-y divide-border text-sm">
    <thead class="bg-surface/70">
      <tr>
        <th *ngFor="let column of columns" class="px-4 py-3 text-left font-semibold text-ink">{{ column.label | translate }}</th>
        <th *ngIf="showActions" class="px-4 py-3 text-right font-semibold text-ink">{{ 'common.actions' | translate }}</th>
      </tr>
    </thead>

    <tbody class="divide-y divide-border bg-panel">
      <tr *ngFor="let row of rows" class="hover:bg-surface/50">
        <td *ngFor="let column of columns" class="px-4 py-3 text-ink">{{ toDisplay(row[column.key]) }}</td>
        <td *ngIf="showActions" class="px-4 py-3 text-right">
          <button class="mr-2 inline-flex items-center gap-1 rounded-xl border border-border px-3 py-1.5 text-xs font-semibold text-ink" (click)="edit.emit(row)">
            <app-icon name="pencil" [size]="14"></app-icon>
            {{ 'common.edit' | translate }}
          </button>
          <button class="inline-flex items-center gap-1 rounded-xl border border-danger/30 px-3 py-1.5 text-xs font-semibold text-danger" (click)="remove.emit(row)">
            <app-icon name="trash" [size]="14"></app-icon>
            {{ 'common.delete' | translate }}
          </button>
        </td>
      </tr>

      <tr *ngIf="rows.length === 0">
        <td [attr.colspan]="columns.length + (showActions ? 1 : 0)" class="px-4 py-6 text-center text-muted">{{ 'common.noRecords' | translate }}</td>
      </tr>
    </tbody>
  </table>

  <div class="flex items-center justify-between border-t border-border bg-surface/70 px-4 py-3 text-xs text-muted">
    <span>{{ 'common.page' | translate }} {{ page }} / {{ totalPages }} ({{ total }} {{ 'common.total' | translate }})</span>
    <div class="space-x-2">
      <button class="rounded-xl border border-border px-3 py-1.5" (click)="previousPage()" [disabled]="page <= 1">{{ 'common.prev' | translate }}</button>
      <button class="rounded-xl border border-border px-3 py-1.5" (click)="nextPage()" [disabled]="page >= totalPages">{{ 'common.next' | translate }}</button>
    </div>
  </div>
</div>

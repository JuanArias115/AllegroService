<div class="flex min-h-screen items-center justify-center px-4">
  <div class="w-full max-w-md rounded-[1.75rem] border border-border bg-panel/95 p-8 shadow-card backdrop-blur">
    <h1 class="text-2xl font-bold text-primary">{{ 'app.name' | translate }}</h1>
    <p class="mt-1 text-sm text-muted">{{ 'login.subtitle' | translate }}</p>

    <div *ngIf="errorMessage" class="mt-4 rounded-xl border border-danger/30 bg-danger/10 px-3 py-2 text-sm text-danger">
      {{ errorMessage }}
    </div>

    <button
      type="button"
      class="mt-5 flex w-full items-center justify-center gap-2 rounded-xl border border-border bg-surface px-4 py-3 text-sm font-semibold text-ink hover:bg-panel disabled:opacity-60"
      (click)="signInWithGoogle()"
      [disabled]="loading"
    >
      <app-icon name="language" [size]="16"></app-icon>
      {{ loadingGoogle ? ('login.connecting' | translate) : ('login.google' | translate) }}
    </button>

    <div class="my-5 flex items-center gap-3 text-xs text-slate-400">
      <span class="h-px flex-1 bg-slate-200"></span>
      <span>{{ 'login.email' | translate }}</span>
      <span class="h-px flex-1 bg-slate-200"></span>
    </div>

    <form class="space-y-4" [formGroup]="form" (ngSubmit)="signInWithEmailPassword()">
      <div>
        <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-muted">{{ 'login.emailLabel' | translate }}</label>
        <input
          type="email"
          formControlName="email"
          class="w-full rounded-lg border border-slate-300 px-3 py-2"
          placeholder="you@company.com"
        />
      </div>

      <div>
        <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-muted">{{ 'login.passwordLabel' | translate }}</label>
        <input
          type="password"
          formControlName="password"
          class="w-full rounded-lg border border-slate-300 px-3 py-2"
          placeholder="******"
        />
      </div>

      <button
        type="submit"
        class="w-full rounded-xl bg-primary px-4 py-3 text-sm font-semibold text-white disabled:opacity-60"
        [disabled]="loading"
      >
        {{ loadingEmail ? ('login.signing' | translate) : ('login.email' | translate) }}
      </button>
    </form>
  </div>
</div>
